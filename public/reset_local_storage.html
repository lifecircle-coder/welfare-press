<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>안티그래비티 - 로컬 스토리지 초기화 도구</title>
</head>
<body style="font-family: sans-serif; padding: 40px; text-align: center;">
    <h2>공공데이터 캐시(로컬 스토리지) 초기화</h2>
    <p>기사 페이지에서 '소스 복사' 또는 '삭제'를 눌러 사라졌던 공공데이터 목록을 다시 초기화(복구)합니다.</p>
    
    <button onclick="clearStorage()" style="padding: 15px 30px; font-size: 16px; background-color: #ef4444; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px;">
        복사 및 삭제 기록 전체 초기화하기
    </button>
    
    <div id="result" style="margin-top: 20px; font-weight: bold; color: #16a34a;"></div>

    <script>
        function clearStorage() {
            localStorage.removeItem('copiedPublicData');
            localStorage.removeItem('deletedPublicData');
            document.getElementById('result').innerText = '초기화가 완료되었습니다! 이제 기사 관리 페이지를 새로고침(F5) 하시면 모든 데이터가 다시 나타납니다.';
        }
    </script>
</body>
</html>
